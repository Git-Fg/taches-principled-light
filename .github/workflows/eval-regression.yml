name: eval-regression

# Enforces the v0.0.5+ release contract for the marketplace:
#   - summary.total_lift.mean_overall_delta >= +15pp
#   - no per-eval total_lift.overall_delta < 0pp
#   - summary has consultation_lift + filesystem_access_lift + total_lift
#
# On a tag push (v*.*.*), this validates the benchmark.json committed at that
# tag's commit and either:
#   - PASS: appends a [release-gate] headline to the GitHub Release notes
#   - FAIL: appends [release-gate] FAIL with reasons to the release notes and
#           fails the build so the tag can be inspected/deleted before re-cut
#
# This job does NOT re-run the iter-7 harness end-to-end. The harness depends
# on a private proxy (100.80.231.128:3456) that is not publicly routable from
# GitHub Actions runners. Re-running on tag push is deferred until the proxy
# has a public endpoint or a self-hosted runner exists.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      benchmark_path:
        description: 'Path to benchmark.json (relative to repo root)'
        required: false
        default: 'docs/principled/skill-evals/marketplace-routing-2026-06-22/iteration-7/benchmark.json'

permissions:
  contents: write  # needed for gh release edit

jobs:
  release-gate:
    name: release gate (iter-7 thresholds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need full history so the tag ref resolves to its commit

      - uses: actions/setup-python@v6
        with:
          {python-version: '3.12'}

      - name: Run release gate
        id: gate
        env:
          BENCHMARK_PATH: ${{ github.event.inputs.benchmark_path || 'docs/principled/skill-evals/marketplace-routing-2026-06-22/iteration-7/benchmark.json' }}
        run: |
          python3 .github/scripts/release-gate.py \
            --benchmark "${BENCHMARK_PATH}" \
            --json > gate-result.json
          cat gate-result.json

      - name: Upload gate result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-result
          path: gate-result.json

      - name: Annotate release with headline or failure
        if: always() && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GATE_JSON: gate-result.json
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          PASSED=$(python3 -c "import json,sys; print(json.load(open('${GATE_JSON}'))['passed'])")
          SUMMARY=$(python3 -c "import json,sys; print(json.load(open('${GATE_JSON}'))['summary'])")
          FAILURES=$(python3 -c "import json,sys; d=json.load(open('${GATE_JSON}')); print('\n'.join('- '+f for f in d['failures']))")
          REPO="${{ github.repository }}"

          if [ "${PASSED}" = "True" ]; then
            MARKER="[release-gate] PASS — ${SUMMARY}"
          else
            printf -v MARKER "[release-gate] FAIL — %s\nFailures:\n%s" "${SUMMARY}" "${FAILURES}"
          fi

          # Try to update the GitHub Release for this tag. If the release was
          # never created (just a tag push), the step is a no-op.
          if gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            EXISTING=$(gh release view "${TAG}" --repo "${REPO}" --json body -q '.body // ""')
            {
              printf '%s\n\n---\n\n%s\n' "${EXISTING}" "${MARKER}"
            } | gh release edit "${TAG}" --repo "${REPO}" --notes-file -
            echo "Release ${TAG} annotated with release-gate result."
          else
            echo "No GitHub Release exists for ${TAG}; skipping release annotation."
            echo "(To annotate manually: gh release create ${TAG} --notes-file -)"
          fi

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## release-gate result"
            echo
            echo '```json'
            cat gate-result.json
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
