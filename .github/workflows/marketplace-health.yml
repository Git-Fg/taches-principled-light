name: marketplace-health

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.agents/skills/**'
      - 'scripts/**'
      - '.pre-commit-config.yaml'
      - '.github/workflows/marketplace-health.yml'
  pull_request:
    paths:
      - 'skills/**'
      - '.agents/skills/**'
      - 'scripts/**'
      - '.pre-commit-config.yaml'

permissions:
  contents: read

jobs:
  health-sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run marketplace-validator
        # Fails on hard failures only; warnings (local frontmatter extensions,
        # description word count over 50) are advisory and allowed.
        run: python3 .agents/skills/marketplace-validator/scripts/validate.py skills/

      - name: Run marketplace-health sweep
        # Without --no-fail: hard failures (broken cross-refs, manifest
        # divergence, missing licenses, doc-state mismatch) fail the build.
        run: python3 .agents/skills/marketplace-health/scripts/health.py

      - name: Run risky-string safety floor
        # CI backstop for the pre-commit hook at .pre-commit-config.yaml.
        # Enforces the spec's risky-string scrub rules on every push to main.
        # Fails the build if any scrubbed pattern re-appears in the active tree.
        run: python3 scripts/check-risky-strings.py $(find . -type f -not -path './.git/*' \( -name '*.md' -o -name '*.py' -o -name '*.yml' -o -name '*.yaml' -o -name '*.json' -o -name '*.txt' -o -name '*.toml' \) -not -path './docs/principled/attic/*' -not -path './docs/principled/specs/*' -not -path './docs/superpowers/plans/*' -not -path './scripts/*')

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: health-report
          path: docs/principled/marketplace-health/*.md
