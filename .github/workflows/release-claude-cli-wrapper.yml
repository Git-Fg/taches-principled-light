name: Release claude-cli-wrapper

# Trigger manually or on version tags of the form: claude-cli-wrapper-v0.2.3
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.3). Defaults to next minor from Cargo.toml.'
        required: false
        type: string
  push:
    tags:
      - 'claude-cli-wrapper-v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            binary_name: claude-cli-wrapper.darwin-arm64
          - target: x86_64-apple-darwin
            binary_name: claude-cli-wrapper.darwin-x86_64
          - target: x86_64-unknown-linux-gnu
            binary_name: claude-cli-wrapper.linux-x86_64
          - target: aarch64-unknown-linux-gnu
            binary_name: claude-cli-wrapper.linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross
        run: |
          cargo install cross --locked --quiet
          # pin cross to a known-working version to avoid surprises
          # (uncomment and set a version if you want pinned installs)

      - name: Build
        run: |
          cross build --release --bin claude-cli-wrapper \
            --target ${{ matrix.target }} \
            --manifest-path plugins/claude-cli-wrapper/Cargo.toml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: |
            target/${{ matrix.target }}/release/claude-cli-wrapper
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/claude-cli-wrapper-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/claude-cli-wrapper-}"
          else
            VERSION="0.2.3"  # fallback for workflow_dispatch without version
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=claude-cli-wrapper-v$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== artifacts/ ==="
          find artifacts -type f -exec ls -lh {} \;

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: claude-cli-wrapper ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/claude-cli-wrapper.darwin-arm64
            artifacts/claude-cli-wrapper.darwin-x86_64
            artifacts/claude-cli-wrapper.linux-x86_64
            artifacts/claude-cli-wrapper.linux-arm64

  commit-binaries:
    name: Commit binaries to repo
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch full history so we can compare and push
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin-temp

      - name: Move binaries into bin/
        run: |
          mkdir -p plugins/claude-cli-wrapper/bin
          mv bin-temp/claude-cli-wrapper.darwin-arm64 \
             plugins/claude-cli-wrapper/bin/claude-cli-wrapper.darwin-arm64
          mv bin-temp/claude-cli-wrapper.darwin-x86_64 \
             plugins/claude-cli-wrapper/bin/claude-cli-wrapper.darwin-x86_64
          mv bin-temp/claude-cli-wrapper.linux-x86_64 \
             plugins/claude-cli-wrapper/bin/claude-cli-wrapper.linux-x86_64
          mv bin-temp/claude-cli-wrapper.linux-arm64 \
             plugins/claude-cli-wrapper/bin/claude-cli-wrapper.linux-arm64

          # Make pre-existing prebuilt executable (darwin-arm64 already was, but linux ones may not be)
          chmod +x plugins/claude-cli-wrapper/bin/claude-cli-wrapper.*

          echo "=== bin/ ==="
          ls -lh plugins/claude-cli-wrapper/bin/

      - name: Commit and push
        env:
          VERSION: ${{ needs.release.outputs.VERSION }}
          TAG_NAME: ${{ needs.release.outputs.TAG_NAME }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add plugins/claude-cli-wrapper/bin/
          git diff --cached --stat
          git commit -m "release(claude-cli-wrapper): add prebuilt binaries for $VERSION

Built from tag $TAG_NAME by .github/workflows/release-claude-cli-wrapper.yml"
          git push

  update-marketplace:
    name: Update marketplace.json version
    needs: release
    runs-on: ubuntu-latest
    # Only run on tag pushes, not manual dispatch
    if: startsWith(github.ref, 'refs/tags/claude-cli-wrapper-')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/claude-cli-wrapper-}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump marketplace.json version
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" \
             '(.[].name == "claude-cli-wrapper") |=
             if . == "claude-cli-wrapper" then
               .version = $v
             else
               .
             end' \
             .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG_NAME: ${{ needs.release.outputs.TAG_NAME }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .claude-plugin/marketplace.json
          git diff --cached --stat
          git commit -m "chore(marketplace): bump claude-cli-wrapper to $VERSION"
          git push